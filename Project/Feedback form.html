
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Student Feedback Form</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container mt-5">
      <h2 class="text-center mb-4">Student Feedback Form</h2>
      <ul class="nav nav-tabs" id="feedbackTabs" role="tablist">
        <li class="nav-item" role="presentation">
          <button
            class="nav-link active"
            id="faculty-tab"
            data-bs-toggle="tab"
            data-bs-target="#faculty"
            type="button"
            role="tab"
          >
            Faculty
          </button>
        </li>
        <li class="nav-item" role="presentation">
          <button
            class="nav-link"
            id="placement-tab"
            data-bs-toggle="tab"
            data-bs-target="#placement"
            type="button"
            role="tab"
          >
            Placements
          </button>
        </li>
        <li class="nav-item" role="presentation">
          <button
            class="nav-link"
            id="curriculum-tab"
            data-bs-toggle="tab"
            data-bs-target="#curriculum"
            type="button"
            role="tab"
          >
            Curriculum Activities
          </button>
        </li>
      </ul>
      
      <form action="connect.php" method="POST"
        class="tab-content border border-top-0 p-4 bg-white needs-validation"
        id="feedbackForm"
        novalidate
      >
        <!-- Faculty Feedback -->
        <div class="tab-pane fade show active" id="faculty" role="tabpanel">
          <div class="mb-3">
            <label for="department" class="form-label">Select Department</label>
            <select
              class="form-select"
              id="department" name="department"
              onchange="loadTeachers()"
              required 
            >
              <option value="" selected disabled>Choose Department</option>
              <option value="CSE">Computer Science</option>
              <option value="ECE">Electrical & Electronics</option>
              <option value="ME">Mechanical</option>
              <option value="CE">Civil</option>
              <option value="MCA">MCA</option>
              <option value="MBA">MBA</option>
            </select>
            <div class="invalid-feedback">Please select a department</div>
          </div>

          <div id="teacherFeedback"></div>
        </div>
        <!--Semester-->
        <div class="tab-pane fade show active" id="faculty" role="tabpanel">
          <div class="mb-3">
            <label for="department" class="form-label"
              >Select Your Semster</label
            >
            <select
              class="form-select"
              id="department" name="semster"
              onchange="loadTeachers()"
              required            >
              <option value="" selected disabled>Choose Your Semster</option>
              <option>1</option>
              <option>2</option>
              <option>3</option>
              <option>4</option>
              <option>5</option>
              <option>6</option>
              <option>7</option>
              <option>8</option>
            </select>
            <div class="invalid-feedback">Please select a department.</div>
          </div>

          <div id="teacherFeedback"></div>
        </div>
        <!--studentid-->
      <div class="form-group">
        <label for="student_id">Student_id</label>
        <input type="text" id="student_id" name="student_id" required />
      </div>
        

        <!-- Placement Feedback -->
        <div class="tab-pane fade" id="placement" role="tabpanel">
          <h5>Training & Placement Feedback</h5>
          <div class="mb-3">
            <label class="form-label"
              >How helpful was the placement training?</label
            >
            <select class="form-select" name="placement_training" required>
              <option value="">Select an option</option>
              <option>Excellent</option>
              <option>Good</option>
              <option>Average</option>
              <option>Poor</option>
            </select>
            <div class="invalid-feedback">This field is required.</div>
          </div>
          <div class="mb-3">
            <label class="form-label"
              >Are you satisfied with the placement opportunities
              provided?</label
            >
            <select class="form-select" name="placement_opportunities" required>
              <option value="">Select an option</option>
              <option>Yes</option>
              <option>No</option>
            </select>
            <div class="invalid-feedback">This field is required.</div>
          </div>
          <div class="mb-3">
            <label class="form-label">Suggestions for improvement</label>
            <textarea
              class="form-control"
              name="placement_suggestions"
              rows="3"
              required
            ></textarea>
            <div class="invalid-feedback">This field is required.</div>
          </div>
        </div>

        <!-- Curriculum Activities Feedback -->
        <div class="tab-pane fade" id="curriculum" role="tabpanel">
          <h5>Curriculum & Activities Feedback</h5>
          <div class="mb-3">
            <label class="form-label"
              >Are the curriculum activities useful for your learning?</label
            >
            <select class="form-select" name="curriculum_usefulness" required>
              <option value="">Select an option</option>
              <option>Strongly Agree</option>
              <option>Agree</option>
              <option>Neutral</option>
              <option>Disagree</option>
            </select>
            <div class="invalid-feedback">This field is required.</div>
          </div>
          <div class="mb-3">
            <label class="form-label"
              >Do extracurricular activities support your skill
              development?</label
            >
            <select class="form-select" name="extra_activities" required>
              <option value="">Select an option</option>
              <option>Yes</option>
              <option>No</option>
            </select>
            <div class="invalid-feedback">This field is required.</div>
          </div>
          <div class="mb-3">
            <label class="form-label">Suggestions for new activities</label>
            <textarea
              class="form-control"
              name="curriculum_suggestions"
              rows="3"
              required
            ></textarea>
            <div class="invalid-feedback">This field is required.</div>
          </div>
        </div>

        <!-- Submit -->
        <div class="text-end mt-4">
          <input type="submit" class="btn btn-primary" name=" submit" />
          ><br /><br />
          <a href="Thankyou.html">Finish</a>
        </div>
      </form>
    </div>

    <script>

        ],

          "Mr.Ashok Ingle",
          "Ms.Raksha Patel",
        ],
        MCA: [
          "Mrs.Rachita Vyas",
          "Mr.Rajesh Gyanchandani",
          "Mrs.Anjali Paliwal",
          "Mrs.Farhat Anjum Khan",
          "Ms.PAvneet Kaur Saluja",
        ],
        MBA: [
          "Mr.Sunny Savle",
          "Mrs.Ashwini Kashyap",
          "Mrs.Pranchi Nagore",
          "MRs.Ritika Desai",
          "Mrs.Priyanka Tanwar",

      };

      function loadTeachers() {
        let dept = document.getElementById("department").value;
        let teachers = teachersByDept[dept] || [];
        let container = document.getElementById("teacherFeedback");
        container.innerHTML = "";

        teachers.forEach((teacher) => {
          let card = document.createElement("div");
          card.className = "card mb-3";
          card.innerHTML = 
        <div class="card-body">
          <h6 class="card-title" >Feedback for ${teacher}</h6>
          <div class="mb-2">
            <label class="form-label">Teaching Quality</label>
            <select class="form-select" name="${teacher}_teaching" required>
              <option value="">Select an option</option>
              <option>Excellent</option>
              <option>Good</option>
              <option>Average</option>
              <option>Poor</option>
            </select>
            <div class="invalid-feedback">This field is required.</div>
          </div>
          <div class="mb-2">
            <label class="form-label">Communication Skills</label>
            <select class="form-select" name="${teacher}_communication" required>
              <option value="">Select an option</option>
              <option>Excellent</option>
              <option>Good</option>
              <option>Average</option>
              <option>Poor</option>
            </select>
            <div class="invalid-feedback">This field is required.</div>
          </div>
          <div class="mb-2">
            <label class="form-label">Subject Knowledge</label>
            <select class="form-select" name="${teacher}_knowledge" required>
              <option value="">Select an option</option>
              <option>Excellent</option>
              <option>Good</option>
              <option>Average</option>
              <option>Poor</option>
            </select>
            <div class="invalid-feedback">This field is required.</div>
          </div>
        </div>
      
          container.appendChild(card);
        });
      }

      // (function () {

      //     "submit",

      //       if (!form.checkValidity()) {
      //         event.preventDefault();

      //         alert("Feedback Submitted Successfully!");
      //       }
      //       form.classList.add("was-validated");
      //     },
      //     false
      //   );
      // })();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
