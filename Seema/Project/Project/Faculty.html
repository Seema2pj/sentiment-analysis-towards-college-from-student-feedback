<!DOCTYPE html>
<html>
<head>
    <title>Faculty Dashboard</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f4f6f9;
        }

        h1 {
            background: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
        }

        /* 🔹 Navigation Bar */
        .nav {
            background: #34495e;
            padding: 10px;
            text-align: center;
        }

        .nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        .nav a:hover {
            color: #1abc9c;
        }

        /* 🔹 Container */
        .container {
            padding: 20px;
        }

        /* 🔹 Cards */
        .card {
            background: white;
            padding: 15px;
            margin: 20px 0;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        /* 🔹 Table */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #3498db;
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background: #f1f1f1;
        }
    </style>
</head>

<body>

<h1>🎓 Faculty Dashboard</h1>

<!-- 🔹 Navigation -->
<div class="nav">
    <a href="#overview">Overview</a>
    <a href="#teacher">Teacher</a>
    <a href="#department">Department</a>
    <a href="#feedback">Insights</a>
    <a href="#trends">Trends</a>
</div>

<div class="container">

    <!-- 🔹 Overview -->
    <div id="overview" class="card">
        <h2>📊 Overview</h2>
        <p><strong>Overall Rating:</strong> 4.2 ⭐</p>
        <p><strong>Total Feedback:</strong> 120</p>
    </div>

    <!-- 🔹 Teacher Performance -->
    <div id="teacher" class="card">
        <h2>👨‍🏫 Teacher Performance</h2>
        <canvas id="teacherChart"></canvas>
    </div>

    <!-- 🔹 Department Analysis -->
    <div id="department" class="card">
        <h2>🏫 Department Analysis</h2>
        <canvas id="deptChart"></canvas>
    </div>

    <!-- 🔹 Feedback Insights -->
    <div id="feedback" class="card">
        <h2>💬 Feedback Insights</h2>

        <table>
            <tr>
                <th>Teacher</th>
                <th>Quality</th>
                <th>Communication</th>
            </tr>
            <tr>
                <td>Sharma</td>
                <td>4</td>
                <td>5</td>
            </tr>
            <tr>
                <td>Verma</td>
                <td>3</td>
                <td>4</td>
            </tr>
        </table>

    </div>

    <!-- 🔹 Trends -->
    <div id="trends" class="card">
        <h2>📈 Trends</h2>
        <canvas id="trendChart"></canvas>
    </div>

</div>

</body>
</html>
